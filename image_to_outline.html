<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image to Coloring Page</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        color: #e0e0e0;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2em;
      }

      .box {
        background: linear-gradient(135deg, #0f3460 0%, #1a5f7a 100%);
        padding: 32px;
        border-radius: 16px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
        color: #00d4ff;
        text-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
        font-weight: 600;
      }

      .description {
        font-size: 0.9rem;
        color: #a0a0a0;
        margin-bottom: 24px;
      }

      .form-group {
        margin: 20px 0;
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
      }

      .file-input-wrapper input[type="file"] {
        display: none;
      }

      .file-input-label {
        display: block;
        padding: 12px 20px;
        background: linear-gradient(135deg, #00d4ff 0%, #0084d4 100%);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        margin-bottom: 12px;
        border: 2px solid transparent;
      }

      .file-input-label:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
      }

      .file-input-label:active {
        transform: translateY(0);
      }

      .drop-zone {
        border: 2px dashed rgba(0, 212, 255, 0.4);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
        transition: all 0.3s ease;
        cursor: pointer;
        background: rgba(0, 212, 255, 0.05);
        margin-top: 12px;
      }

      .drop-zone.dragover {
        border-color: #00d4ff;
        background: rgba(0, 212, 255, 0.15);
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        transform: scale(1.02);
      }

      .drop-zone-text {
        font-size: 0.9rem;
        color: #a0a0a0;
        pointer-events: none;
      }

      .file-name {
        font-size: 0.85rem;
        color: #88ccee;
        margin-top: 8px;
        min-height: 20px;
      }

      .controls {
        display: flex;
        gap: 12px;
        margin: 20px 0;
        flex-wrap: wrap;
        justify-content: center;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .control-group label {
        font-size: 0.85rem;
        color: #a0a0a0;
      }

      .control-group input[type="range"] {
        width: 150px;
        cursor: pointer;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        background: #00d4ff;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
      }

      canvas {
        width: 100%;
        max-width: 100%;
        margin: 24px 0;
        border: 2px solid rgba(0, 212, 255, 0.3);
        border-radius: 8px;
        background: #000a1a;
        display: block;
        max-height: 500px;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 0, 0, 0.5);
      }

      .canvas-placeholder {
        padding: 60px 20px;
        color: #606080;
        font-size: 0.95rem;
      }

      .button-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      button {
        padding: 12px 24px;
        font-size: 0.95rem;
        border-radius: 8px;
        border: 2px solid transparent;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #download {
        background: linear-gradient(135deg, #00d4ff 0%, #0084d4 100%);
        color: white;
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
      }

      #download:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(0, 212, 255, 0.5);
      }

      #reset {
        background: rgba(100, 100, 120, 0.3);
        color: #a0a0a0;
        border: 2px solid rgba(100, 100, 120, 0.5);
      }

      #reset:hover:not(:disabled) {
        background: rgba(100, 100, 120, 0.5);
        color: #d0d0e0;
      }

      .status {
        font-size: 0.85rem;
        color: #88ccee;
        min-height: 20px;
        margin: 12px 0;
      }

      .error {
        color: #ff6b6b;
      }

      .success {
        color: #51cf66;
      }

      .back-home {
        margin: 2em 0;
        text-align: center;
      }

      .back-home a {
        display: inline-block;
        padding: 0.75em 2em;
        background: linear-gradient(135deg, #2563eb 0%, #1a5f7a 100%);
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1em;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .back-home a:hover {
        background: linear-gradient(135deg, #1a5f7a 0%, #00d4ff 100%);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
      }

      @media (max-width: 600px) {
        .box {
          padding: 20px;
          max-width: 100%;
        }

        h1 {
          font-size: 1.4rem;
        }

        .controls {
          flex-direction: column;
        }

        .control-group input[type="range"] {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="box">
        <h1>🖊️ Image → Coloring Page</h1>
        <p class="description">Convert your images into beautiful line art coloring pages</p>

        <div class="form-group">
          <div class="file-input-wrapper">
            <input type="file" accept="image/*" id="upload" />
            <label for="upload" class="file-input-label">📁 Choose Image</label>
            <div class="file-name" id="fileName"></div>
          </div>

          <div class="drop-zone" id="dropZone">
            <div class="drop-zone-text">
              💧 Or drag and drop your image here
            </div>
          </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
          <div class="control-group">
            <label for="threshold">Edge Sensitivity</label>
            <input type="range" id="threshold" min="5" max="100" value="30" />
            <span id="thresholdValue">30</span>
          </div>
          <div class="control-group">
            <label for="blur">Smoothness</label>
            <input type="range" id="blur" min="0" max="10" value="1" />
            <span id="blurValue">1</span>
          </div>
        </div>

        <div class="status" id="status"></div>

        <canvas id="canvas"></canvas>

        <div class="button-group" id="buttonGroup" style="display: none;">
          <button id="download">⬇️ Download PNG</button>
          <button id="reset">🔄 Reset</button>
        </div>
      </div>
      <div class="back-home">
        <a href="index.html"> ⬅️ Back to Home Page </a>
      </div>
    </div>

    <script>
      const upload = document.getElementById("upload");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const downloadBtn = document.getElementById("download");
      const resetBtn = document.getElementById("reset");
      const controls = document.getElementById("controls");
      const buttonGroup = document.getElementById("buttonGroup");
      const status = document.getElementById("status");
      const fileName = document.getElementById("fileName");
      const thresholdSlider = document.getElementById("threshold");
      const blurSlider = document.getElementById("blur");
      const thresholdValue = document.getElementById("thresholdValue");
      const blurValue = document.getElementById("blurValue");
      const dropZone = document.getElementById("dropZone");

      let originalImage = null;
      let MAX_CANVAS_SIZE = 1200; // Prevent memory issues with huge images

      upload.addEventListener("change", handleImage);
      downloadBtn.addEventListener("click", downloadImage);
      resetBtn.addEventListener("click", resetCanvas);
      thresholdSlider.addEventListener("input", updatePreview);
      blurSlider.addEventListener("input", updatePreview);

      // Drag and drop events
      dropZone.addEventListener("dragover", handleDragOver);
      dropZone.addEventListener("dragleave", handleDragLeave);
      dropZone.addEventListener("drop", handleDrop);

      function handleDragOver(e) {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.add("dragover");
      }

      function handleDragLeave(e) {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove("dragover");
      }

      function handleDrop(e) {
        e.preventDefault();
        e.stopPropagation();
        dropZone.classList.remove("dragover");

        const files = e.dataTransfer.files;
        if (files.length > 0) {
          const file = files[0];
          // Check if file is an image
          if (file.type.startsWith("image/")) {
            // Create a synthetic change event
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            upload.files = dataTransfer.files;
            handleImage({ target: { files: dataTransfer.files } });
          } else {
            updateStatus("Please drop an image file.", "error");
          }
        }
      }

      function updateStatus(message, type = "info") {
        status.textContent = message;
        status.className = "status " + type;
      }

      function handleImage(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Show file name
        fileName.textContent = "📄 " + file.name;
        updateStatus("Loading image...", "info");

        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            originalImage = img;
            prepareCanvas(img);
            updateStatus("Image loaded! Adjust settings.", "success");
            controls.style.display = "flex";
            buttonGroup.style.display = "flex";
            processImage();
          };
          img.onerror = () => {
            updateStatus("Error loading image. Please try another.", "error");
            originalImage = null;
          };
          img.src = event.target.result;
        };
        reader.onerror = () => {
          updateStatus("Error reading file.", "error");
        };
        reader.readAsDataURL(file);
      }

      function prepareCanvas(img) {
        let width = img.width;
        let height = img.height;

        // Scale down large images
        if (width > MAX_CANVAS_SIZE || height > MAX_CANVAS_SIZE) {
          const scale = Math.min(MAX_CANVAS_SIZE / width, MAX_CANVAS_SIZE / height);
          width = Math.round(width * scale);
          height = Math.round(height * scale);
        }

        canvas.width = width;
        canvas.height = height;
      }

      function updatePreview() {
        thresholdValue.textContent = thresholdSlider.value;
        blurValue.textContent = blurSlider.value;
        if (originalImage) {
          processImage();
        }
      }

      function processImage() {
        if (!originalImage) return;

        updateStatus("Processing...", "info");

        // Draw original image
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);

        // Apply blur if needed
        const blurAmount = parseInt(blurSlider.value);
        if (blurAmount > 0) {
          applyBlur(blurAmount);
        }

        // Convert to grayscale
        convertToGrayscale();

        // Apply edge detection
        const threshold = parseInt(thresholdSlider.value);
        detectEdges(threshold);

        updateStatus("Ready to download!", "success");
      }

      function convertToGrayscale() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          // Use weighted grayscale formula for better results
          const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
          data[i] = data[i + 1] = data[i + 2] = gray;
        }

        ctx.putImageData(imgData, 0, 0);
      }

      function applyBlur(radius) {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const width = imgData.width;
        const height = imgData.height;

        const temp = new Uint8ClampedArray(data);

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            let r = 0, g = 0, b = 0, count = 0;

            for (let dy = -radius; dy <= radius; dy++) {
              for (let dx = -radius; dx <= radius; dx++) {
                const nx = Math.min(Math.max(x + dx, 0), width - 1);
                const ny = Math.min(Math.max(y + dy, 0), height - 1);
                const i = (ny * width + nx) * 4;

                r += temp[i];
                g += temp[i + 1];
                b += temp[i + 2];
                count++;
              }
            }

            const i = (y * width + x) * 4;
            data[i] = Math.round(r / count);
            data[i + 1] = Math.round(g / count);
            data[i + 2] = Math.round(b / count);
          }
        }

        ctx.putImageData(imgData, 0, 0);
      }

      function detectEdges(threshold) {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        const width = imgData.width;
        const height = imgData.height;

        const output = ctx.createImageData(width, height);
        const outData = output.data;

        // Sobel edge detection
        for (let y = 1; y < height - 1; y++) {
          for (let x = 1; x < width - 1; x++) {
            const i = (y * width + x) * 4;

            // Sobel X kernel
            const gx =
              -data[((y - 1) * width + (x - 1)) * 4] -
              2 * data[((y) * width + (x - 1)) * 4] -
              data[((y + 1) * width + (x - 1)) * 4] +
              data[((y - 1) * width + (x + 1)) * 4] +
              2 * data[((y) * width + (x + 1)) * 4] +
              data[((y + 1) * width + (x + 1)) * 4];

            // Sobel Y kernel
            const gy =
              -data[((y - 1) * width + (x - 1)) * 4] -
              2 * data[((y - 1) * width + (x)) * 4] -
              data[((y - 1) * width + (x + 1)) * 4] +
              data[((y + 1) * width + (x - 1)) * 4] +
              2 * data[((y + 1) * width + (x)) * 4] +
              data[((y + 1) * width + (x + 1)) * 4];

            const magnitude = Math.sqrt(gx * gx + gy * gy);
            const edge = magnitude > threshold ? 0 : 255;

            outData[i] = outData[i + 1] = outData[i + 2] = edge;
            outData[i + 3] = 255;
          }
        }

        // Fill borders
        for (let x = 0; x < width; x++) {
          const topIdx = x * 4;
          const bottomIdx = ((height - 1) * width + x) * 4;
          outData[topIdx] = outData[topIdx + 1] = outData[topIdx + 2] = 255;
          outData[bottomIdx] = outData[bottomIdx + 1] = outData[bottomIdx + 2] = 255;
        }
        for (let y = 0; y < height; y++) {
          const leftIdx = (y * width) * 4;
          const rightIdx = (y * width + width - 1) * 4;
          outData[leftIdx] = outData[leftIdx + 1] = outData[leftIdx + 2] = 255;
          outData[rightIdx] = outData[rightIdx + 1] = outData[rightIdx + 2] = 255;
        }

        ctx.putImageData(output, 0, 0);
      }

      function invertColors() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        for (let i = 0; i < data.length; i += 4) {
          data[i] = 255 - data[i];       // Red
          data[i + 1] = 255 - data[i + 1]; // Green
          data[i + 2] = 255 - data[i + 2]; // Blue
          // Alpha stays the same
        }

        ctx.putImageData(imgData, 0, 0);
      }

      function downloadImage() {
        const link = document.createElement("a");
        const timestamp = new Date().toISOString().slice(0, 10);
        link.download = `coloring-page-${timestamp}.png`;
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
        updateStatus("Image downloaded!", "success");
      }

      function resetCanvas() {
        upload.value = "";
        canvas.width = 0;
        canvas.height = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        controls.style.display = "none";
        buttonGroup.style.display = "none";
        fileName.textContent = "";
        status.textContent = "";
        originalImage = null;
        thresholdSlider.value = 30;
        blurSlider.value = 1;
        thresholdValue.textContent = "30";
        blurValue.textContent = "1";
      }
    </script>
  </body>
</html>
